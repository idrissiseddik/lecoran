<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>قيد الإنشاء</title>
    <!-- Google Font pour une belle écriture arabe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* suppression totale de tout défilement */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;   /* pas de scroll du tout */
            font-family: 'Cairo', sans-serif;
            background: #ffffff;  /* fond blanc comme Word */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* conteneur central : texte uniquement, sans fioritures */
        .message-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 2rem;
            width: 100%;
            max-width: 650px;
            color: #1a1a1a;  /* noir classique */
            font-family: 'Cairo', 'Arial', sans-serif;
        }

        /* adresse du site en haut */
        .site-url {
            font-size: 1.2rem;
            font-weight: 400;
            color: #0563c1;  /* bleu comme un lien Word */
            text-decoration: underline;
            margin-bottom: 0.3rem;
            letter-spacing: 0.3px;
        }

        .main-title {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1.3;
            color: #1a1a1a;
        }

        .retouche-line {
            font-size: 1.6rem;
            font-weight: 400;
            color: #1a1a1a;
        }

        .sub-line {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .launch-line {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .invite-message {
            font-size: 1.4rem;
            font-weight: 400;
            color: #1a1a1a;
            margin-top: 0.2rem;
        }

        /* ligne fine discrète comme un séparateur Word */
        .divider {
            width: 100px;
            height: 1px;
            background: #cccccc;
            margin: 0.1rem 0;
        }

        /* responsive pour petits écrans */
        @media (max-width: 600px) {
            .site-url {
                font-size: 1rem;
            }
            .main-title {
                font-size: 2.5rem;
            }
            .retouche-line {
                font-size: 1.3rem;
            }
            .sub-line {
                font-size: 1.5rem;
            }
            .launch-line {
                font-size: 2.2rem;
            }
            .invite-message {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 400px) {
            .site-url {
                font-size: 0.9rem;
            }
            .main-title {
                font-size: 2rem;
            }
            .retouche-line {
                font-size: 1.1rem;
            }
            .sub-line {
                font-size: 1.2rem;
            }
            .launch-line {
                font-size: 1.8rem;
            }
            .invite-message {
                font-size: 1rem;
            }
        }

        @media (max-height: 550px) {
            .site-url {
                font-size: 0.9rem;
                margin-bottom: 0.1rem;
            }
            .main-title {
                font-size: 2rem;
            }
            .retouche-line {
                font-size: 1.1rem;
            }
            .sub-line {
                font-size: 1.2rem;
            }
            .launch-line {
                font-size: 1.8rem;
            }
            .invite-message {
                font-size: 1rem;
                margin-top: 0.1rem;
            }
            .message-container {
                gap: 0.4rem;
                padding: 1rem;
            }
            .divider {
                margin: 0.05rem 0;
            }
        }
    </style>
</head>
<body>
    <div class="message-container">

        <!-- Adresse du site en haut -->
        <div class="site-url">lequran.vercel.app</div>

        <!-- 1. قيد الإنشاء -->
        <div class="main-title">قيد الإنشاء</div>

        <!-- ligne fine décorative -->
        <div class="divider"></div>

        <!-- 2. في آخر اللمسات قبل الإطلاق -->
        <div class="retouche-line">في آخر اللمسات قبل الإطلاق</div>

        <!-- 3. الموقع سيكون جاهزاً اليوم -->
        <div class="sub-line">الموقع سيكون جاهزاً اليوم</div>

        <!-- 4. إن شاء الله -->
        <div class="launch-line">إن شاء الله</div>

        <!-- Message d'invitation en bas -->
        <div class="invite-message">عودوا لزيارة الموقع هذا اليوم</div>

    </div>
</body>
</html>
