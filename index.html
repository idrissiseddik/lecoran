<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>قيد الإنشاء</title>
    <!-- Google Font pour une belle écriture arabe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* suppression totale de tout défilement */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;   /* pas de scroll du tout */
            font-family: 'Cairo', 'Arial', sans-serif;
            background: #ffffff;  /* fond blanc pur */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* conteneur principal : tout le contenu vertical */
        .page-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            width: 100%;
            max-width: 700px;
            padding: 1.5rem 2rem;
            background: #ffffff;
        }

        /* HEADER : adresse du site */
        .header {
            width: 100%;
            text-align: center;
            padding-top: 0.5rem;
        }

        .site-url {
            font-size: 1.2rem;
            font-weight: 400;
            color: #0563c1;
            text-decoration: underline;
            letter-spacing: 0.3px;
        }

        /* CORPS : messages centrés */
        .body-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            flex: 1;
            width: 100%;
            color: #1a1a1a;
        }

        .main-title {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1.3;
            color: #1a1a1a;
        }

        .retouche-line {
            font-size: 1.6rem;
            font-weight: 400;
            color: #1a1a1a;
        }

        .sub-line {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .launch-line {
            font-size: 2.8rem;
            font-weight: 700;
            color: #1a1a1a;
        }

        .invite-message {
            font-size: 1.4rem;
            font-weight: 400;
            color: #1a1a1a;
            margin-top: 0.2rem;
        }

        /* ligne fine décorative */
        .divider {
            width: 100px;
            height: 1px;
            background: #cccccc;
            margin: 0.1rem 0;
        }

        /* FOOTER : mention de création */
        .footer {
            width: 100%;
            text-align: center;
            padding-bottom: 0.5rem;
            font-size: 0.95rem;
            font-weight: 400;
            color: #555555;
            border-top: 1px solid #eeeeee;
            padding-top: 0.8rem;
        }

        /* responsive pour petits écrans */
        @media (max-width: 600px) {
            .site-url {
                font-size: 1rem;
            }
            .main-title {
                font-size: 2.5rem;
            }
            .retouche-line {
                font-size: 1.3rem;
            }
            .sub-line {
                font-size: 1.5rem;
            }
            .launch-line {
                font-size: 2.2rem;
            }
            .invite-message {
                font-size: 1.1rem;
            }
            .footer {
                font-size: 0.8rem;
            }
            .page-container {
                padding: 1rem 1.2rem;
            }
        }

        @media (max-width: 400px) {
            .site-url {
                font-size: 0.9rem;
            }
            .main-title {
                font-size: 2rem;
            }
            .retouche-line {
                font-size: 1.1rem;
            }
            .sub-line {
                font-size: 1.2rem;
            }
            .launch-line {
                font-size: 1.8rem;
            }
            .invite-message {
                font-size: 1rem;
            }
            .footer {
                font-size: 0.7rem;
            }
        }

        @media (max-height: 550px) {
            .site-url {
                font-size: 0.9rem;
            }
            .main-title {
                font-size: 2rem;
            }
            .retouche-line {
                font-size: 1.1rem;
            }
            .sub-line {
                font-size: 1.2rem;
            }
            .launch-line {
                font-size: 1.8rem;
            }
            .invite-message {
                font-size: 1rem;
            }
            .footer {
                font-size: 0.7rem;
                padding-top: 0.4rem;
                padding-bottom: 0.2rem;
            }
            .body-content {
                gap: 0.4rem;
            }
            .divider {
                margin: 0.05rem 0;
            }
            .page-container {
                padding: 0.8rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">

        <!-- HEADER : adresse du site -->
        <div class="header">
            <div class="site-url">lequran.vercel.app</div>
        </div>

        <!-- CORPS : messages centrés -->
        <div class="body-content">

            <div class="main-title">قيد الإنشاء</div>

            <div class="divider"></div>

            <div class="retouche-line">في آخر اللمسات قبل الإطلاق</div>

            <div class="sub-line">الموقع سيكون جاهزاً اليوم</div>

            <div class="launch-line">إن شاء الله</div>

            <div class="invite-message">عودوا لزيارة الموقع هذا اليوم</div>

        </div>

        <!-- FOOTER : mention de création -->
        <div class="footer">
            إنشاء و تصميم : م.الصديق الإدريسي
        </div>

    </div>
</body>
</html>
